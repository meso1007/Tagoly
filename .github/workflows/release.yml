name: Release

on:
  push:
    tags:
      - "*" # 全てのタグプッシュで起動

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 履歴を全て取得（Changelog生成に必要）

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26" # 堀内さんの環境に合わせて最新に

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
